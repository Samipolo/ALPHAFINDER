databases:
  - name: alphafinder-db
    plan: free
    databaseName: alphafinder
    user: alphafinder

services:
  - type: web
    name: alphafinder
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: DATABASE_URL
        fromDatabase:
          name: alphafinder-db
          property: connectionString